include:
 - ../compose-base.yml
services:
  journald:
    build: .
    restart: on-failure
    privileged: true
    user: root
    entrypoint: /lib/systemd/systemd
    depends_on:
      vlagent:
        condition: service_started
      vmauth:
        condition: service_started
      victoriametrics:
        condition: service_started
