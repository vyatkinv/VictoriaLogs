services:
  vault:
    image: hashicorp/vault:1.17
    hostname: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s

  vault-setup:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: root
    volumes:
      - ./scripts/vault-pki-setup.sh:/setup.sh:ro
      - vault-approle:/creds
    entrypoint: ["/bin/sh", "/setup.sh"]

  victoria-logs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      vault-setup:
        condition: service_completed_successfully
    ports:
      - "9428:9428"
      - "6514:6514"
    volumes:
      # role_id/secret_id written by vault-setup. Read-only: this process never
      # needs to modify its own credentials.
      - vault-approle:/creds:ro
    # Certificate TTL is intentionally short (2m) to allow observing hot reload.
    # At ~80 s after startup the background renewer will issue a fresh certificate.
    command:
      - -httpListenAddr=:9428
      # -tls is enabled automatically when -tls.vaultAddr is set.
      - -tls.vaultAddr=http://vault:8200
      # AppRole instead of a static token: no credential is passed on the command
      # line, where it would be visible in /proc/<pid>/cmdline and `docker inspect`.
      - -tls.vaultAuthMethod=approle
      - -tls.vaultAuthRoleIDFile=/creds/role_id
      - -tls.vaultAuthSecretIDFile=/creds/secret_id
      - -tls.vaultRevokeOnShutdown=true
      - -tls.vaultPKIPath=pki
      - -tls.vaultRole=victoria-logs
      - -tls.vaultCommonName=localhost
      # vlagent connects to https://victoria-logs:9428, so that name must be in the SANs.
      - -tls.vaultAltNames=victoria-logs
      - -tls.vaultTTL=2m
      # Syslog TCP over TLS: certs come from Vault because -syslog.tls is enabled
      # and -syslog.tlsCertFile/-syslog.tlsKeyFile are intentionally left unset.
      - -syslog.listenAddr.tcp=:6514
      - -syslog.tls
      - -storageDataPath=/tmp/vldata
    healthcheck:
      # 127.0.0.1, not localhost: in the container localhost resolves to ::1 first,
      # but the server binds IPv4 0.0.0.0, so an IPv6 probe would be refused.
      test: ["CMD", "sh", "-c", "wget -qO- --no-check-certificate https://127.0.0.1:9428/health | grep -q OK"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # vlagent exercises the other half of the integration: it serves TLS from Vault
  # on its own port and it talks to victoria-logs over TLS whose client
  # certificate and CA both come from Vault, so no PEM file exists anywhere.
  vlagent:
    build:
      context: .
      dockerfile: Dockerfile.dev
    entrypoint: ["vlagent"]
    depends_on:
      victoria-logs:
        condition: service_healthy
    ports:
      - "9429:9429"
    volumes:
      - vault-approle:/creds:ro
    command:
      - -httpListenAddr=:9429
      - -remoteWrite.url=https://victoria-logs:9428/insert/native
      # Note the absence of -remoteWrite.tlsCAFile and -remoteWrite.tlsCertFile:
      # both are replaced by the two Vault flags below.
      - -tls.vaultClientAuth=true
      - -tls.vaultTrustPKICA=true
      - -tls.vaultAddr=http://vault:8200
      - -tls.vaultAuthMethod=approle
      - -tls.vaultAuthRoleIDFile=/creds/vlagent_role_id
      - -tls.vaultAuthSecretIDFile=/creds/vlagent_secret_id
      - -tls.vaultPKIPath=pki
      - -tls.vaultRole=vlagent
      - -tls.vaultCommonName=vlagent
      - -tls.vaultAltNames=localhost
      - -tls.vaultTTL=2m
      - -tmpDataPath=/tmp/vlagent
    healthcheck:
      # 127.0.0.1, not localhost: see the note on the victoria-logs healthcheck.
      test: ["CMD", "sh", "-c", "wget -qO- --no-check-certificate https://127.0.0.1:9429/health | grep -q OK"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  # Carries the AppRole credentials from vault-setup to victoria-logs and vlagent.
  vault-approle:
