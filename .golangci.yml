version: "2"
linters:
  enable:
    - errorlint
    - whitespace
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
    errorlint:
      errorf: true
      # Do not enable `comparison` and `asserts`: they produce false positives,
      # since many call sites intentionally compare sentinel errors directly (e.g. err == io.EOF)
      # when the producer is documented to return them unwrapped. See https://github.com/VictoriaMetrics/VictoriaLogs/pull/1490
      comparison: false
      asserts: false
  exclusions:
    generated: lax
    presets:
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        text: '(SA(4003|1019|5011)|QF1001):'
    paths:
      - ^app/vmui/
      # Verbatim forks of VictoriaMetrics packages. They must stay byte-identical
      # to upstream so they can be reconciled mechanically on vendor updates,
      # so they are not held to this project's lint settings.
      # See lib/httpserver/UPSTREAM.md.
      - ^lib/httpserver/
      - ^lib/writeconcurrencylimiter/
      - ^lib/protoparser/
